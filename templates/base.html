<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MedMinder{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:       #7BAF8E;
      --sage-light: #A8CDB8;
      --sage-dark:  #4E8268;
      --cream:      #F7F4EE;
      --warm-white: #FDFCF9;
      --charcoal:   #2C2C2C;
      --slate:      #5A6472;
      --muted:      #9CA6B0;
      --border:     #E4DDD2;
      --shadow:     0 2px 12px rgba(44,44,44,0.08);
      --shadow-lg:  0 8px 32px rgba(44,44,44,0.12);
      --radius:     14px;
      --radius-sm:  8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--charcoal);
    }

    .nav-brand .pill {
      background: var(--sage);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-brand span {
      font-family: 'Fraunces', serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--slate);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      background: var(--cream);
      color: var(--sage-dark);
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-user img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
    }

    .nav-user .user-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--slate);
    }

    .nav-user a.logout {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: all 0.2s;
    }

    .nav-user a.logout:hover {
      border-color: var(--sage);
      color: var(--sage-dark);
    }

    /* ── Main content ── */
    main {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.55rem 1.2rem;
      border-radius: 20px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--sage);
      color: white;
    }

    .btn-primary:hover { background: var(--sage-dark); transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--slate);
    }

    .btn-outline:hover { border-color: var(--sage); color: var(--sage-dark); }

    .btn-danger {
      background: #F2E8E8;
      color: #C0392B;
      border: 1px solid #E8D0D0;
    }

    .btn-danger:hover { background: #E8D0D0; }

    /* ── Form elements ── */
    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.825rem;
      font-weight: 500;
      color: var(--slate);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type=text], input[type=time], select, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--charcoal);
      background: white;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--sage);
    }

    textarea { resize: vertical; min-height: 70px; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(44,44,44,0.35);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--warm-white);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      transform: translateY(16px);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover { color: var(--charcoal); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--charcoal);
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      z-index: 300;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Utility ── */
    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 1.25rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.95rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-sage { background: #E8F3ED; color: var(--sage-dark); }
    .badge-muted { background: #EEF0F2; color: var(--slate); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% if user %}
<nav>
  <a class="nav-brand" href="{{ url_for('dashboard') }}">
    <div class="pill">💊</div>
    <span>MedMinder</span>
  </a>

  <div class="nav-links">
    <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Today</a>
    <a href="{{ url_for('medications_page') }}" class="{{ 'active' if request.endpoint == 'medications_page' }}">Medications</a>
    <a href="{{ url_for('history_page') }}" class="{{ 'active' if request.endpoint == 'history_page' }}">History</a>
  </div>

  <div class="nav-user">
    {% if user.picture %}
    <img src="{{ user.picture }}" alt="{{ user.name }}">
    {% endif %}
    <span class="user-name">{{ user.given_name or user.name }}</span>
    <a href="{{ url_for('logout') }}" class="logout">Sign out</a>
  </div>
</nav>
{% endif %}

<main>
  {% block content %}{% endblock %}
</main>

<div class="toast" id="toast"></div>

<script>
  function showToast(msg, duration=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function openModal(id) {
    document.getElementById(id).classList.add('open');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // close modal on backdrop click
  document.querySelectorAll('.modal-backdrop').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target === el) el.classList.remove('open');
    });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
